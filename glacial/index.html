<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLACIAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&amp;family=Space+Grotesk:wght@300;400;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="loader-inner">
      <div class="loader-brand">GLACIAL</div>
      <div class="loader-progress-wrap">
        <div id="loader-bar"></div>
      </div>
      <div id="loader-percent">0%</div>
    </div>
  </div>

  <!-- FRAME CANVAS (layer 1 — video frames) -->
  <canvas id="frame-canvas"></canvas>

  <!-- THREE.JS CANVAS (layer 2 — particles, inserted by overlays.js) -->

  <!-- HUD -->
  <div id="hud">

    <!-- Top-left: title -->
    <div id="hud-title">GLACIAL</div>

    <!-- Left sidebar: coordinates -->
    <div id="hud-coords">
      <span>71°17'N</span>
      <span>156°47'W</span>
      <span>STATION 04</span>
    </div>

    <!-- Right sidebar: manifesto (Scene 2) -->
    <div id="hud-manifesto">
      <span>silence is the first language</span>
      <span>of ice. it speaks in fractures,</span>
      <span>in light trapped for millennia.</span>
    </div>

    <!-- Floating labels (Scene 2) -->
    <div id="hud-labels-s2" class="hud-labels">
      <span class="hud-label" style="top: 35%; left: 15%;">64°N 18°W</span>
      <span class="hud-label" style="top: 55%; right: 20%;">−41.2°C</span>
      <span class="hud-label" style="top: 70%; left: 40%;">PERMAFROST</span>
    </div>

    <!-- Floating labels (Scene 3) -->
    <div id="hud-labels-s3" class="hud-labels">
      <span class="hud-label" style="top: 25%; left: 25%;">ICE-07A</span>
      <span class="hud-label" style="top: 50%; right: 15%;">CRYO.441</span>
      <span class="hud-label" style="top: 65%; left: 55%;">FRZ-∞</span>
    </div>

    <!-- Bottom-left: sound toggle -->
    <button id="hud-sound">Sound: Off</button>

    <!-- Bottom-right: scroll hint (Scene 1) -->
    <div id="hud-scroll-hint">Scroll to discover</div>

    <!-- Bottom-right: return hint (Scene 3 end) -->
    <div id="hud-return-hint">↑ Return to surface</div>
  </div>

  <!-- SCROLL CONTAINER -->
  <div id="scroll-container"></div>

  <!-- CDN Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/lenis@1/dist/lenis.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
  <script src="js/overlays.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
